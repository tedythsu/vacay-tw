name: Update Holiday Data

on:
  # 每月 1 日 UTC 00:00 執行（台灣時間 08:00）
  schedule:
    - cron: '0 0 1 * *'
  # 也可以在 GitHub 上手動觸發
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch latest holiday data
        run: node scripts/fetch-holidays.mjs

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet src/data/holidays.json || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/holidays.json
          git commit -m "chore(data): update holidays from TaiwanCalendar CDN"
          git push
